<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>語音溝通板 (高對比記憶版)</title>
    <style>
        /* 核心視覺變數：黑底黃字極致對比 */
        :root {
            --bg-color: #000000;
            --text-color: #FFFF00;
            --btn-idle: #FFFF00;
            --btn-text: #000000;
            --btn-recording: #FF3B30;
            --history-bg: #111111;
        }
        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: system-ui, -apple-system, 'PingFang TC', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* 頂部狀態列 */
        #header {
            padding: 15px; background: #000000; border-bottom: 2px solid #333300; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .header-btn {
            color: var(--text-color); text-decoration: none; cursor: pointer; 
            font-size: 18px; font-weight: bold; padding: 5px 10px;
            border: 1px solid var(--text-color); border-radius: 8px;
        }
        #clear-keys { font-size: 14px; border: none; color: #888800; text-decoration: underline; }

        /* 主文字顯示區 */
        #text-container {
            flex: 1; padding: 5vw; display: flex; align-items: center; justify-content: center;
            overflow: hidden; text-align: center; word-break: break-all;
        }
        #text-display {
            width: 100%; font-weight: 900; transition: font-size 0.2s ease-out;
            text-shadow: 0 0 5px rgba(255, 255, 0, 0.3); /* 增強字體辨識度 */
        }

        /* 底部控制區 */
        #controls {
            padding: 20px; background-color: #000000; display: flex; justify-content: center;
            border-top: 2px solid #333300; padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }
        
        /* 錄音按鈕：反轉為黃底黑字，創造絕對的視覺焦點 */
        #record-btn {
            width: 70vw; max-width: 400px; height: 80px; 
            border: none; border-radius: 40px; background-color: var(--btn-idle);
            color: var(--btn-text); font-size: 26px; font-weight: 900;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.4); transition: all 0.2s ease;
        }
        #record-btn.recording {
            background-color: var(--btn-recording); color: #FFFFFF;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.6); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }

        /* 歷史紀錄覆蓋層 (Overlay) */
        #history-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); z-index: 100;
            display: none; flex-direction: column;
        }
        #history-header {
            padding: 15px; background: #111100; border-bottom: 2px solid var(--text-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        #history-content {
            flex: 1; overflow-y: auto; padding: 20px;
        }
        .history-item {
            background: var(--history-bg); border-left: 5px solid var(--text-color);
            padding: 15px; margin-bottom: 15px; border-radius: 0 8px 8px 0;
        }
        .history-time { font-size: 14px; color: #AAAA00; margin-bottom: 5px; }
        .history-text { font-size: 24px; font-weight: bold; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="header">
        <div class="header-btn" onclick="toggleHistory(true)">📜 歷史紀錄</div>
        <div id="clear-keys" onclick="clearKey()">重設金鑰</div>
    </div>

    <div id="text-container">
        <div id="text-display">請點擊下方按鈕開始</div>
    </div>

    <div id="controls">
        <button id="record-btn">按住說話</button>
    </div>

    <div id="history-panel">
        <div id="history-header">
            <div class="header-btn" onclick="toggleHistory(false)">⬅ 返回</div>
            <div class="header-btn" style="border-color: #FF3B30; color: #FF3B30;" onclick="clearHistory()">🗑 清除全部</div>
        </div>
        <div id="history-content" id="history-list">
            </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let historyData = JSON.parse(localStorage.getItem('chat_history') || '[]');

        const recordBtn = document.getElementById('record-btn');
        const textDisplay = document.getElementById('text-display');
        const textContainer = document.getElementById('text-container');
        const historyPanel = document.getElementById('history-panel');
        const historyContent = document.getElementById('history-content');

        // 動態字體縮放
        function adjustFontSize() {
            const text = textDisplay.innerText;
            const len = text.length;
            let fontSize = len < 5 ? 20 : len < 15 ? 15 : len < 30 ? 10 : len < 60 ? 7 : 5;                
            textDisplay.style.fontSize = fontSize + "vw";
            while (textDisplay.offsetHeight > textContainer.offsetHeight * 0.9 && fontSize > 3) {
                fontSize -= 0.5;
                textDisplay.style.fontSize = fontSize + "vw";
            }
        }

        window.addEventListener('resize', adjustFontSize);

        function updateText(msg) {
            textDisplay.innerText = msg;
            adjustFontSize();
        }

        // 歷史紀錄核心邏輯
        function saveToHistory(text) {
            if (!text || text === "未能聽清楚，請再說一次。") return;
            
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            historyData.unshift({ time: timeString, text: text });
            if (historyData.length > 50) historyData.pop(); // 最多保留 50 筆，避免塞爆記憶體
            
            localStorage.setItem('chat_history', JSON.stringify(historyData));
        }

        function renderHistory() {
            historyContent.innerHTML = historyData.length === 0 
                ? '<div style="text-align:center; color:#555500; margin-top:50px; font-size:20px;">尚無紀錄</div>'
                : historyData.map(item => `
                    <div class="history-item">
                        <div class="history-time">${item.time}</div>
                        <div class="history-text">${item.text}</div>
                    </div>
                `).join('');
        }

        function toggleHistory(show) {
            if (show) renderHistory();
            historyPanel.style.display = show ? 'flex' : 'none';
        }

        function clearHistory() {
            if (confirm("確定要刪除所有歷史紀錄嗎？")) {
                historyData = [];
                localStorage.removeItem('chat_history');
                renderHistory();
            }
        }

        // 金鑰管理
        const getApiKey = () => {
            let key = localStorage.getItem('whisper_api_key');
            if (!key) {
                key = prompt("請輸入 OpenAI API Key:");
                if (key && key.startsWith('sk-')) localStorage.setItem('whisper_api_key', key.trim());
                else return null;
            }
            return key;
        };

        const clearKey = () => {
            localStorage.removeItem('whisper_api_key');
            alert('金鑰已清除。');
            location.reload();
        };

        // 音訊引擎
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const actualMimeType = mediaRecorder.mimeType || 'audio/webm';
                    const audioBlob = new Blob(audioChunks, { type: actualMimeType });
                    audioChunks = [];
                    await processWithWhisper(audioBlob);
                };
            } catch (e) {
                updateText("麥克風授權失敗");
            }
        }

        // Whisper API 調用
        async function processWithWhisper(blob) {
            const apiKey = getApiKey();
            if (!apiKey) return;
            
            updateText("正在轉成文字...");
            const formData = new FormData();
            formData.append('file', blob, 'audio.webm');
            formData.append('model', 'whisper-1');
            formData.append('language', 'zh');
            formData.append('prompt', '繁體中文，台灣口音，中英夾雜。');

            try {
                const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}` },
                    body: formData
                });
                
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                if (data.text) {
                    updateText(data.text);
                    saveToHistory(data.text); // 成功辨識後寫入歷史紀錄
                } else {
                    updateText("未能聽清楚，請再說一次。");
                }
            } catch (e) { 
                updateText("系統網路錯誤"); 
            }
        }

        // 狀態機控制
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder) await initAudio();
            if (!mediaRecorder) return; 

            if (!isRecording) {
                mediaRecorder.start();
                recordBtn.innerText = "停止錄音";
                recordBtn.classList.add('recording');
                updateText("聆聽中...");
            } else {
                mediaRecorder.stop();
                recordBtn.innerText = "按住說話";
                recordBtn.classList.remove('recording');
            }
            isRecording = !isRecording;
        });
    </script>
</body>
</html>
