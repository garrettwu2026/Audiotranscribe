<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 語音溝通板 Pro</title>
    <style>
        :root {
            --bg-color: #0F0F0F;
            --text-color: #F0F0F0;
            --accent-openai: #10a37f;
            --accent-gemini: #4285f4;
            --btn-recording: #FF3B30;
        }
        body {
            margin: 0; background: var(--bg-color); color: var(--text-color);
            font-family: system-ui, -apple-system, 'PingFang TC', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        #header {
            display: flex; justify-content: space-around; padding: 15px;
            background: #1A1A1A; border-bottom: 1px solid #333; z-index: 10;
        }
        .provider-btn {
            padding: 10px 20px; border-radius: 20px; border: 2px solid transparent;
            background: #333; color: #AAA; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .provider-btn.active[data-type="openai"] { border-color: var(--accent-openai); color: white; background: #154d3f; }
        .provider-btn.active[data-type="gemini"] { border-color: var(--accent-gemini); color: white; background: #1a3a6d; }

        /* 文字顯示區域：核心更新 */
        #text-container {
            flex: 1; padding: 5vw; display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* 防止出現滾動條影響計算 */
            text-align: center; word-break: break-all;
        }
        #text-display {
            width: 100%;
            font-weight: 700;
            transition: font-size 0.2s ease-out; /* 縮放時平滑過度 */
        }

        #controls {
            padding: 30px; background: #1A1A1A; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.3);
        }
        #record-btn {
            width: 85vw; max-width: 500px; height: 100px; border-radius: 50px;
            border: none; font-size: 28px; font-weight: 900; color: white;
            background: var(--accent-openai); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #record-btn.recording { background: var(--btn-recording); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.98); } 100% { transform: scale(1); } }
        
        #clear-keys { margin-top: 15px; color: #666; font-size: 14px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <div class="provider-btn active" data-type="openai">OpenAI (Whisper)</div>
        <div
