<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>語音溝通板</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #FFFFFF;
            --btn-idle: #1E88E5;
            --btn-recording: #E53935;
        }
        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: system-ui, -apple-system, 'PingFang TC', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        #header {
            padding: 10px; background: #1A1A1A; border-bottom: 1px solid #333; 
            text-align: right; z-index: 10;
        }
        #clear-keys {
            color: #666; text-decoration: underline; cursor: pointer; font-size: 14px; padding: 5px;
        }

        #text-container {
            flex: 1; padding: 5vw; display: flex; align-items: center; justify-content: center;
            overflow: hidden; text-align: center; word-break: break-all;
        }
        #text-display {
            width: 100%; font-weight: 700; transition: font-size 0.2s ease-out;
        }

        /* 底部控制區：優化比例，保留視覺空間 */
        #controls {
            padding: 20px; background-color: #1E1E1E; display: flex; justify-content: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.4); padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }
        
        /* 縮小化按鈕設計 */
        #record-btn {
            width: 65vw; max-width: 350px; height: 75px; 
            border: none; border-radius: 40px; background-color: var(--btn-idle);
            color: white; font-size: 24px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.2s ease;
        }
        #record-btn.recording {
            background-color: var(--btn-recording); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="header">
        <span id="clear-keys" onclick="clearKey()">重設系統金鑰</span>
    </div>

    <div id="text-container">
        <div id="text-display">請點擊下方按鈕開始說話</div>
    </div>

    <div id="controls">
        <button id="record-btn">按住說話</button>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const recordBtn = document.getElementById('record-btn');
        const textDisplay = document.getElementById('text-display');
        const textContainer = document.getElementById('text-container');

        // 動態字體縮放
        function adjustFontSize() {
            const text = textDisplay.innerText;
            const len = text.length;
            let fontSize;

            if (len < 5) fontSize = 20;       
            else if (len < 15) fontSize = 15; 
            else if (len < 30) fontSize = 10; 
            else if (len < 60) fontSize = 7;  
            else fontSize = 5;                

            textDisplay.style.fontSize = fontSize + "vw";
            
            while (textDisplay.offsetHeight > textContainer.offsetHeight * 0.9 && fontSize > 3) {
                fontSize -= 0.5;
                textDisplay.style.fontSize = fontSize + "vw";
            }
        }

        window.addEventListener('resize', adjustFontSize);

        function updateText(msg) {
            textDisplay.innerText = msg;
            adjustFontSize();
        }

        // 金鑰管理
        const getApiKey = () => {
            let key = localStorage.getItem('whisper_api_key');
            if (!key) {
                key = prompt("請輸入 OpenAI API Key:\n(僅儲存於本設備)");
                if (key && key.startsWith('sk-')) {
                    localStorage.setItem('whisper_api_key', key.trim());
                } else {
                    alert("金鑰格式錯誤，請重新整理網頁。");
                    return null;
                }
            }
            return key;
        };

        const clearKey = () => {
            localStorage.removeItem('whisper_api_key');
            alert('金鑰已清除。');
            location.reload();
        };

        // 音訊引擎初始化
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const actualMimeType = mediaRecorder.mimeType || 'audio/webm';
                    const audioBlob = new Blob(audioChunks, { type: actualMimeType });
                    audioChunks = [];
                    await processWithWhisper(audioBlob);
                };
            } catch (e) {
                updateText("麥克風授權失敗，請檢查瀏覽器設定。");
                console.error("Audio Init Error:", e);
            }
        }

        // Whisper 處理邏輯
        async function processWithWhisper(blob) {
            const apiKey = getApiKey();
            if (!apiKey) return;
            
            updateText("正在轉成文字...");

            const formData = new FormData();
            formData.append('file', blob, 'audio.webm');
            formData.append('model', 'whisper-1');
            formData.append('language', 'zh');
            formData.append('prompt', '繁體中文，台灣口音，中英夾雜。');

            try {
                const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}` },
                    body: formData
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error?.message || `HTTP ${res.status}`);
                }
                
                const data = await res.json();
                updateText(data.text || "未能聽清楚，請再說一次。");
            } catch (e) { 
                updateText(`系統錯誤: ${e.message}`); 
                console.error("Whisper Error:", e);
            }
        }

        // UI 狀態控制
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder) await initAudio();
            if (!mediaRecorder) return; 

            if (!isRecording) {
                mediaRecorder.start();
                recordBtn.innerText = "停止錄音";
                recordBtn.classList.add('recording');
                updateText("聆聽中...");
            } else {
                mediaRecorder.stop();
                recordBtn.innerText = "按住說話";
                recordBtn.classList.remove('recording');
            }
            isRecording = !isRecording;
        });
    </script>
</body>
</html>
